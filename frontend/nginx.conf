server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router fix: if the file doesn't exist on disk,
    # serve index.html and let React handle the routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward all /api/ requests to the Spring Boot api-gateway
    # "api-gateway" is the service name defined in docker-compose.yml
    location /api/ {
        proxy_pass http://api-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
