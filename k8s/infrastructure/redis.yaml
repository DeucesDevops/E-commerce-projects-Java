# Redis — used by cart-service for cart storage
# We use a Deployment (not StatefulSet) because Redis is used for temporary
# session data that can be recreated if lost (carts expire anyway after 7 days)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: shoeapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: shoeapp
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
