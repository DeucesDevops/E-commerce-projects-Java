# ─────────────────────────────────────────────────────────
# Ingress — routes external traffic into the cluster
#
# Prerequisites:
#   1. Nginx Ingress Controller:
#      kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
#
#   2. cert-manager (for automatic TLS via Let's Encrypt):
#      kubectl apply -f k8s/infrastructure/cert-manager.yaml
#
# Replace "shoeapp.example.com" with your real domain before deploying.
# For local testing without TLS, remove the tls: section and cert-manager annotations.
# ─────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shoeapp-ingress
  namespace: shoeapp
  annotations:
    # Automatic TLS certificate from Let's Encrypt via cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Force HTTP → HTTPS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Sticky sessions for Eureka (services always talk to the same instance)
    nginx.ingress.kubernetes.io/affinity: "cookie"
    # Increase timeout for slow startup responses
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # Increase body size for product image uploads
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - shoeapp.example.com
      secretName: shoeapp-tls
    - hosts:
        - grafana.shoeapp.example.com
      secretName: grafana-tls
    - hosts:
        - kibana.shoeapp.example.com
      secretName: kibana-tls
    - hosts:
        - jaeger.shoeapp.example.com
      secretName: jaeger-tls
    - hosts:
        - eureka.shoeapp.example.com
      secretName: eureka-tls
  rules:
    # Main app — frontend + API
    - host: shoeapp.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

    # Grafana dashboard — https://grafana.shoeapp.example.com
    - host: grafana.shoeapp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000

    # Kibana log search — https://kibana.shoeapp.example.com
    - host: kibana.shoeapp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kibana
                port:
                  number: 5601

    # Jaeger tracing — https://jaeger.shoeapp.example.com
    - host: jaeger.shoeapp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jaeger
                port:
                  number: 16686

    # Eureka dashboard — https://eureka.shoeapp.example.com
    - host: eureka.shoeapp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: discovery-server
                port:
                  number: 8761
