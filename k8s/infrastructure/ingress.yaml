# ─────────────────────────────────────────────────────────
# Ingress — routes external traffic into the cluster
#
# Requires the Nginx Ingress Controller installed:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
#
# In production, replace "shoeapp.local" with your real domain.
# For local testing, add these to /etc/hosts:
#   127.0.0.1  shoeapp.local
#   127.0.0.1  grafana.shoeapp.local
#   127.0.0.1  kibana.shoeapp.local
#   127.0.0.1  jaeger.shoeapp.local
#   127.0.0.1  eureka.shoeapp.local
# ─────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shoeapp-ingress
  namespace: shoeapp
  annotations:
    # Enable sticky sessions for Eureka (services always talk to the same instance)
    nginx.ingress.kubernetes.io/affinity: "cookie"
    # Increase timeout for slow startup responses
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    # Main app — frontend + API
    - host: shoeapp.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

    # Grafana dashboard — http://grafana.shoeapp.local
    - host: grafana.shoeapp.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000

    # Kibana log search — http://kibana.shoeapp.local
    - host: kibana.shoeapp.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kibana
                port:
                  number: 5601

    # Jaeger tracing — http://jaeger.shoeapp.local
    - host: jaeger.shoeapp.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jaeger
                port:
                  number: 16686

    # Eureka dashboard — http://eureka.shoeapp.local
    - host: eureka.shoeapp.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: discovery-server
                port:
                  number: 8761
