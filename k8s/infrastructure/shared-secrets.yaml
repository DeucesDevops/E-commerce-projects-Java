# Shared secrets used by multiple services.
#
# IMPORTANT: In real production:
#   1. Never commit actual secret values to Git
#   2. Use tools like: kubectl create secret, Sealed Secrets, AWS Secrets Manager,
#      or HashiCorp Vault to inject secrets at deploy time
#   3. This file should have placeholder values only — real values go in CI/CD vars
apiVersion: v1
kind: Secret
metadata:
  name: shoeapp-shared-secrets
  namespace: shoeapp
type: Opaque
stringData:
  # Must be identical in auth-service and api-gateway
  # Generate with: openssl rand -base64 64
  jwt-secret: "replace-with-a-long-random-string-minimum-64-characters-for-HS256-security"

  # Get from https://dashboard.stripe.com/test/apikeys
  stripe-secret-key: "sk_test_replace_with_real_key"

  # Email SMTP credentials
  mail-username: "your-email@gmail.com"
  mail-password: "your-gmail-app-password"
