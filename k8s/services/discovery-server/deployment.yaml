apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-server
  namespace: shoeapp
spec:
  # Only 1 replica — Eureka doesn't support active-active clustering easily.
  # In production you'd use a managed service discovery (AWS Cloud Map, Consul).
  replicas: 1
  selector:
    matchLabels:
      app: discovery-server
  template:
    metadata:
      labels:
        app: discovery-server
    spec:
      containers:
        - name: discovery-server
          # Replace "yourname" with your Docker Hub username
          image: ghcr.io/deucesdevops/discovery-server:latest
          imagePullPolicy: Always   # always pull the latest image on pod start
          ports:
            - containerPort: 8761
          envFrom:
            # Load all keys from the ConfigMap as environment variables
            - configMapRef:
                name: discovery-server-config
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger:4317"
            - name: OTEL_SERVICE_NAME
              value: "discovery-server"
          resources:
            requests:
              cpu: "200m"      # 0.2 CPU cores minimum
              memory: "256Mi"  # 256 MB RAM minimum
            limits:
              cpu: "500m"      # never use more than 0.5 CPU cores
              memory: "512Mi"  # never use more than 512 MB RAM
          # readinessProbe: only route traffic here if /actuator/health returns 200
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30   # wait 30s before first check (JVM startup)
            periodSeconds: 10
          # livenessProbe: restart the pod if it becomes unresponsive
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 60
            periodSeconds: 15
