# ─────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — runs on every push to main
#
# BEFORE THIS WORKS, add these secrets in GitHub:
#   Repository → Settings → Secrets and variables → Actions → New secret
#
#   DOCKER_USERNAME   — your Docker Hub username
#   DOCKER_PASSWORD   — your Docker Hub password or access token
#   KUBECONFIG        — base64 of your cluster's kubeconfig file
#                       Generate with: base64 -w 0 ~/.kube/config
#   JWT_SECRET        — your production JWT secret (64+ chars)
#   STRIPE_SECRET_KEY — your Stripe live secret key
#   MAIL_USERNAME     — your email address
#   MAIL_PASSWORD     — your email app password
# ─────────────────────────────────────────────────────────────────────
name: CI/CD Pipeline

on:
  push:
    branches: [main]

# Environment variables available to all jobs
env:
  DOCKER_REGISTRY: docker.io
  # Change "yourname" to your actual Docker Hub username
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}

jobs:
  # ─── JOB 1: TEST ──────────────────────────────────────────────────
  # Runs Maven tests for every backend service in parallel.
  # If any service's tests fail, the build stops here — nothing is deployed.
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - discovery-server
          - api-gateway
          - auth-service
          - product-service
          - inventory-service
          - order-service
          - cart-service
          - user-service
          - notification-service
          - payment-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Cache Maven dependencies so we don't re-download them every run
          cache: maven

      - name: Run tests for ${{ matrix.service }}
        run: mvn test --no-transfer-progress
        working-directory: backend/${{ matrix.service }}

  # ─── JOB 2: BUILD AND PUSH DOCKER IMAGES ─────────────────────────
  # Builds the Docker image for every service and pushes to Docker Hub.
  # Uses the Git commit SHA as the image tag — this guarantees every
  # commit produces a unique, traceable image.
  #
  # Example tag: yourname/auth-service:a3f9c12
  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test   # only runs if all tests pass
    strategy:
      matrix:
        include:
          - service: discovery-server
            context: backend/discovery-server
          - service: api-gateway
            context: backend/api-gateway
          - service: auth-service
            context: backend/auth-service
          - service: product-service
            context: backend/product-service
          - service: inventory-service
            context: backend/inventory-service
          - service: order-service
            context: backend/order-service
          - service: cart-service
            context: backend/cart-service
          - service: user-service
            context: backend/user-service
          - service: notification-service
            context: backend/notification-service
          - service: payment-service
            context: backend/payment-service
          - service: frontend
            context: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # docker/metadata-action automatically generates tags and labels
      # We use two tags:
      #   1. The short Git SHA (e.g. a3f9c12) — unique, traceable
      #   2. "latest" — always points to the newest build
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      # BuildKit speeds up builds by caching layers in GitHub's cache storage
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache from/to GitHub Actions cache — avoids re-downloading Maven deps
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── JOB 3: UPDATE IMAGE TAGS (GitOps / ArgoCD) ──────────────────
  # Instead of running kubectl directly, we:
  #   1. Update the image tag in each k8s deployment.yaml in Git
  #   2. Commit and push that change to main
  #   3. ArgoCD watches main → detects the change → deploys to the cluster
  #
  # This is the GitOps pattern — Git is the single source of truth.
  # Benefits over direct kubectl:
  #   - Full audit trail: every deploy is a Git commit
  #   - Easy rollback: just revert the commit
  #   - ArgoCD UI shows live deployment status with health checks
  #   - selfHeal: if someone manually edits the cluster, ArgoCD reverts it
  update-image-tags:
    name: Update Image Tags (GitOps)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Use a token with write access so we can push back to the repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "sha=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      # Update the image field in each deployment.yaml from:
      #   image: yourname/auth-service:latest
      # to:
      #   image: yourname/auth-service:a3f9c12
      #
      # sed -i performs an in-place substitution:
      #   's|old pattern|new value|' file
      - name: Update deployment image tags
        run: |
          TAG=${{ steps.tag.outputs.sha }}
          REGISTRY=${{ secrets.DOCKER_USERNAME }}

          for SERVICE in discovery-server api-gateway auth-service product-service \
                         inventory-service order-service cart-service user-service \
                         notification-service payment-service frontend; do
            DEPLOY_FILE="k8s/services/$SERVICE/deployment.yaml"
            if [ -f "$DEPLOY_FILE" ]; then
              sed -i "s|image: $REGISTRY/$SERVICE:.*|image: $REGISTRY/$SERVICE:$TAG|g" "$DEPLOY_FILE"
              echo "Updated $SERVICE → $REGISTRY/$SERVICE:$TAG"
            fi
          done

      # Commit the updated deployment.yaml files and push to main.
      # ArgoCD is watching main and will pick up this commit automatically.
      - name: Commit and push updated image tags
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/services/*/deployment.yaml
          git commit -m "chore: update image tags to ${{ steps.tag.outputs.sha }} [skip ci]"
          git push origin main
          # [skip ci] prevents this commit from triggering another pipeline run

      - name: Summary
        run: |
          echo "✅ Image tags updated to: ${{ steps.tag.outputs.sha }}"
          echo "ArgoCD will now sync the cluster automatically."
          echo "Monitor at: https://localhost:8090 (ArgoCD UI)"
